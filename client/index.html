<!doctype html>
<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>%VITE_APP_TITLE%</title>
    
    <!-- PWA Manifest - Dynamic: switches based on current path -->
    <!-- Admin pages (/dashboard/*, /admin/*) use manifest-admin.json; public pages use manifest.json -->
    <link rel="manifest" id="pwa-manifest" href="/manifest.json" />
    <script>
      // Switch manifest BEFORE React loads - critical for PWA install dialog
      (function() {
        var path = window.location.pathname;
        var isAdmin = path.startsWith('/admin') || path.startsWith('/dashboard');
        if (isAdmin) {
          document.getElementById('pwa-manifest').href = '/manifest-admin.json';
          // Also update theme-color for admin
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.content = '#1e40af';
          // Update title
          document.title = '\u0644\u0648\u062d\u0629 \u062a\u062d\u0643\u0645 SGH';
        }
      })();
    </script>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#00A651" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SGH صنعاء" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Meta Domain Verification - sghsanaa.com -->
    <meta name="facebook-domain-verification" content="dffx9wkmz2qq0g1b8yjrtmp3qhb38b" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="احجز موعدك مع أفضل الأطباء في المستشفى السعودي الألماني بصنعاء. خدمات طبية متميزة، عروض خاصة، ومخيمات صحية مجانية. اتصل الآن: 8000018" />
    <meta name="keywords" content="المستشفى السعودي الألماني, صنعاء, حجز موعد, أطباء, عروض طبية, مخيمات صحية, استشارات طبية, 8000018" />
    <meta name="author" content="المستشفى السعودي الألماني - صنعاء" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="المستشفى السعودي الألماني - صنعاء" />
    <meta property="og:title" content="المستشفى السعودي الألماني - صنعاء | احجز موعدك الآن" />

    <meta property="og:image" content="https://sghsanaa.manus.space/assets/logo-color.png" />
