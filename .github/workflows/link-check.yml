name: "🔗 فحص سلامة الروابط (Markdown Link Check)"

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - '**/*.md'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - '**/*.md'
  workflow_dispatch:

jobs:
  markdown-link-check:
    name: "فحص روابط Markdown"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 استنساخ الكود (Checkout Code)"
        uses: actions/checkout@v4

      - name: "🔗 تشغيل فحص الروابط (Run Link Check)"
        uses: tcort/markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          config-file: '.github/workflows/link-check-config.json'
