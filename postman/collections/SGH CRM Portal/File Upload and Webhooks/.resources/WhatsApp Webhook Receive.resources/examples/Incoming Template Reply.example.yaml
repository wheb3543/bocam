$kind: http-example
name: 'Incoming Template Reply'
request:
  url: '{{baseUrl}}/api/webhooks/whatsapp'
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: X-Hub-Signature-256
      value: 'sha256=jkl012examplesignature'
  body:
    type: json
    content: |-
      {
        "object": "whatsapp_business_account",
        "entry": [
          {
            "id": "123456789",
            "changes": [
              {
                "value": {
                  "messaging_product": "whatsapp",
                  "metadata": {
                    "display_phone_number": "15550000001",
                    "phone_number_id": "987654321"
                  },
                  "contacts": [
                    {
                      "profile": {
                        "name": "Fatima Al-Zahra"
                      },
                      "wa_id": "966500000004"
                    }
                  ],
                  "messages": [
                    {
                      "from": "966500000004",
                      "id": "wamid.HBgLNTU1MjEyMzQ1NjcVAgARGBI0RjQyNUE3NEYxMzAzMzQ1AA==",
                      "timestamp": "1700000300",
                      "type": "button",
                      "button": {
                        "payload": "CONFIRM_APPOINTMENT_12345",
                        "text": "Confirm"
                      },
                      "context": {
                        "from": "15550000001",
                        "id": "wamid.original_template_message_id"
                      }
                    }
                  ]
                },
                "field": "messages"
              }
            ]
          }
        ]
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "success": true
      }
order: 4000
