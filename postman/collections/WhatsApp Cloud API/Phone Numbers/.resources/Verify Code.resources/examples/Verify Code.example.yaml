$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/verify_code
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{User-Access-Token}}
  body:
    type: json
    content: |-
      {
          "code": "<your-requested-code>"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "success": true
      }
order: 1000
