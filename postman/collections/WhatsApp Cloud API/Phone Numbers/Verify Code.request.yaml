$kind: http-request
description: |-
  After you received a SMS or Voice request code from [**`Request Verification Code`**](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/phone-numbers#verify), you need to verify the code that was sent to you. To verify this code, make a **POST** request to **`{{PHONE_NUMBER_ID}}/verify_code`** that includes the code as a parameter.

  #### Request Parameters

  | Name                  | Description                 |
  |-----------------------|-----------------------------|
  | **`code`**<br/>type: Numeric String | **Required**.<br/>The code you received after calling [**`Request Verification Code`**](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/phone-numbers#verify)(**`{{PHONE_NUMBER_ID}}/request_code`**).  |
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/verify_code
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{User-Access-Token}}
body:
  type: text
  content: |-
    {
        "code": "<your-requested-code>"
    }
examples: ./.resources/Verify Code.resources/examples
order: 6000
