$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/whatsapp_business_encryption
  method: POST
  body:
    type: formdata
    content:
      - type: text
        key: business_public_key
        value: |-
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKC
          ...
          8QIDAQAB
          -----END PUBLIC KEY-----
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "success": true
      }
order: 1000
