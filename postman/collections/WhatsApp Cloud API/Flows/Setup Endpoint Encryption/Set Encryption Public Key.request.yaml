$kind: http-request
description: Sets the public key that is used for encrypting the data channel requests
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/whatsapp_business_encryption
method: POST
body:
  type: formdata
  content:
    - type: text
      key: business_public_key
      value: |-
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKC
        ...
        8QIDAQAB
        -----END PUBLIC KEY-----
examples: ./.resources/Set Encryption Public Key.resources/examples
order: 1000
