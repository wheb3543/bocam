$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/flows
  method: POST
  body:
    type: formdata
    content:
      - type: text
        key: name
        value: <FLOW_NAME>
      - type: text
        key: categories
        value: '["OTHER"]'
      - type: text
        key: clone_flow_id
        value: <EXISTING_FLOW_ID>
        disabled: true
      - type: text
        key: endpoint_uri
        value: https://example.com
        disabled: true
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "id": "flow-1"
      }
order: 1000
