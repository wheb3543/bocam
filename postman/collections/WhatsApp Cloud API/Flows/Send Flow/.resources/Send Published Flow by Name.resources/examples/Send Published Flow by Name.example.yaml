$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  method: POST
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "to": "{{Recipient-Phone-Number}}",
          "recipient_type": "individual",
          "type": "interactive",
          "interactive": {
              "type": "flow",
              "header": {
                  "type": "text",
                  "text": "<HEADER_TEXT>"
              },
              "body": {
                  "text": "<BODY_TEXT>"
              },
              "footer": {
                  "text": "<FOOTER_TEXT>"
              },
              "action": {
                  "name": "flow",
                  "parameters": {
                      "flow_message_version": "3",
                      "flow_action": "navigate",
                      "flow_token": "<FLOW_TOKEN>",
                      "flow_name": "{{Flow-Name}}",
                      "flow_cta": "Open Flow!",
                      "flow_action_payload": {
                          "screen": "<SCREEN_ID>",
                          "data": {
                              "<CUSTOM_KEY>": "<CUSTOM_VALUE>"
                          }
                      }
                  }
              }
          }
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "contacts": [
              {
                  "input": "18055555555",
                  "wa_id": "18055555555"
              }
          ],
          "messages": [
              {
                  "id": "wamid.HBgL..."
              }
          ]
      }
order: 1000
