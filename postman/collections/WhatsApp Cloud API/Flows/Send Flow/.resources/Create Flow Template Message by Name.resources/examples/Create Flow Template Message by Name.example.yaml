$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates
  method: POST
  body:
    type: json
    content: |-
      {
          "name": "<TEMPLATE_NAME>",
          "language": "en_US",
          "category": "MARKETING",
          "components": [
              {
                  "type": "body",
                  "text": "Check out this new offer"
              },
              {
                  "type": "BUTTONS",
                  "buttons": [
                      {
                          "type": "FLOW",
                          "text": "Check out this offer!",
                          "flow_name": "{{Flow-Name}}",
                          "navigate_screen": "<SCREEN_ID>",
                          "flow_action": "navigate"
                      }
                  ]
              }
          ]
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "id": "template-1",
          "status": "PENDING",
          "category": "MARKETING"
      }
order: 1000
