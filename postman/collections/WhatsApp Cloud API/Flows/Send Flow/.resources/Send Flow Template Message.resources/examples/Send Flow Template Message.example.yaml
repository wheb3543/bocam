$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  method: POST
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "to": "{{Recipient-Phone-Number}}",
          "type": "template",
          "template": {
              "name": "<TEMPLATE_NAME>",
              "language": {
                  "code": "en_US"
              },
              "components": [
                  {
                      "type": "button",
                      "sub_type": "flow",
                      "index": "0",
                      "parameters": [
                          {
                              "type": "action",
                              "action": {
                                  "flow_token": "<FLOW_TOKEN>",
                                  "flow_action_data": {
                                      "<CUSTOM_KEY>": "<CUSTOM_VALUE>"
                                  }
                              }
                          }
                      ]
                  }
              ]
          }
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "contacts": [
              {
                  "input": "18055555555",
                  "wa_id": "18055555555"
              }
          ],
          "messages": [
              {
                  "id": "wamid.HBgL..."
              }
          ]
      }
order: 1000
