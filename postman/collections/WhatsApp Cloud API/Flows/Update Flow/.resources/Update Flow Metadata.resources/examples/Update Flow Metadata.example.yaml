$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}
  method: POST
  body:
    type: formdata
    content:
      - type: text
        key: name
        value: <NEW_FLOW_NAME>
      - type: text
        key: categories
        value: '["OTHER"]'
      - type: text
        key: endpoint_uri
        value: https://example.com
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "success": true
      }
order: 1000
