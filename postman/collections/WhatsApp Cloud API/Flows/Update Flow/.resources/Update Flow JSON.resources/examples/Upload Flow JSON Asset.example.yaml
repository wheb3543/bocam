$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Flow-ID}}/assets
  method: POST
  body:
    type: formdata
    content:
      - type: file
        key: file
        src: []
      - type: text
        key: name
        value: flow.json
      - type: text
        key: asset_type
        value: FLOW_JSON
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "success": true,
          "validation_errors": [
              {
                  "error": "INVALID_PROPERTY",
                  "error_type": "JSON_SCHEMA_ERROR",
                  "message": "The property \"initial-text\" cannot be specified at \"$root/screens/0/layout/children/2/children/0\".",
                  "line_start": 46,
                  "line_end": 46,
                  "column_start": 17,
                  "column_end": 30
              }
          ]
      }
order: 1000
