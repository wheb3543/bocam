$kind: http-request
description: |-
  When a message with media is received, the WhatsApp Business API downloads the media. A notification is sent to your Webhook once the media is downloaded.  

  The Webhook notification contains information that identifies the media object and enables you to find and retrieve the object. [Use the media endpoints to retrieve the media](#39a02bc0-ede1-4848-b24e-4ac3d501aaea).
url: ''
method: VIEW
