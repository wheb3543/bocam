$kind: http-request
description: |-
  When you receive a media message containing a sticker, WhatsApp Business API downloads the sticker and a notification is sent to your Webhook once the sticker is downloaded.

  The Webhook notification contains information that identifies the media object and allows you to find and retrieve the object. [Use the media endpoints to retrieve the media](https://desktop.postman.com/?desktopVersion=9.16.0&userId=14291747&teamId=1367031).
url: ""
method: VIEW
body:
  type: json
  content: |-
    {
        "object": "whatsapp_business_account",
        "entry": [
            {
                "id": "8856996819413533",
                "changes": [
                    {
                        "value": {
                            "messaging_product": "whatsapp",
                            "metadata": {
                                "display_phone_number": "<DISPLAY_PHONE_NUMBER>",
                                "phone_number_id": "<PHONE_NUMBER_ID>"
                            },
                            "contacts": [
                                {
                                    "profile": {
                                        "name": "<CONTACT_NAME>"
                                    },
                                    "wa_id": "<WA_ID>"
                                }
                            ],
                            "messages": [
                                {
                                    "from": "<SENDER_PHONE_NUMBER>",
                                    "id": "<WHATSAPP_BUSINESS_ACCOUNT_ID>",
                                    "timestamp": "<TIMESTAMP>",
                                    "type": "sticker",
                                    "sticker": {
                                        "id": "<ID>",
                                        "animated": false,
                                        "mime_type": "image/webp",
                                        "sha256": "<HASH>"
                                    }
                                }
                            ]
                        },
                        "field": "messages"
                    }
                ]
            }
        ]
    }
order: 6000
