$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Media-ID}}?phone_number_id=<PHONE_NUMBER_ID>
  method: DELETE
  headers:
    Authorization: Bearer {{User-Access-Token}}
  queryParams:
    phone_number_id: <PHONE_NUMBER_ID>
  body:
    type: formdata
    content: []
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "success": true
      }
order: 1000
