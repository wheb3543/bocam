$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/media
  method: POST
  body:
    type: formdata
    content:
      - type: text
        key: messaging_product
        value: whatsapp
      - type: file
        key: file
        src: VTU9ki3ZH/sample-ogg.ogg
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
          "id": "<MEDIA_ID>"
      }
order: 1000
