$kind: http-request
description: |-
  To delete media, make a **DELETE** call to the ID of the media you want to delete.

  ## Prerequisites
  - [User Access Token](https://developers.facebook.com/docs/facebook-login/access-tokens#usertokens) with **`whatsapp_business_messaging`** permission
  - Media object ID from either uploading media endpoint or media message Webhooks

  ## Request
  [Perform requests in Graph API Explorer](https://developers.facebook.com/tools/explorer/?method=DELETE&path=media_id&version=v8.0)
url: https://graph.facebook.com/{{Version}}/{{Media-ID}}/?phone_number_id=<PHONE_NUMBER_ID>
method: DELETE
queryParams:
  - key: phone_number_id
    value: <PHONE_NUMBER_ID>
    description: Specifies that deletion of the media  only be performed if the media belongs to the provided phone number.
body:
  type: formdata
  content: []
examples: ./.resources/Delete Media.resources/examples
order: 5000
