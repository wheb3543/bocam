$kind: http-request
description: This request uploads a sticker as .webp. The parameters are specified as **form-data** in the request **body**.
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/media
method: POST
body:
  type: formdata
  content:
    - type: text
      key: messaging_product
      value: whatsapp
    - type: file
      key: file
      src: /Users/sticker.webp
examples: ./.resources/Upload Sticker.resources/examples
order: 2000
