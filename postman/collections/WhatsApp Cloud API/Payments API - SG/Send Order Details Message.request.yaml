$kind: http-request
description: "Guide: [Payments API - SG](https://developers.facebook.com/docs/whatsapp/cloud-api/payments-api/payments-sg)"
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
method: POST
body:
  type: json
  content: |-
    {
        "messaging_product": "whatsapp",
        "recipient_type": "individual",
        "to": "{{Recipient-WA-ID}}",
        "type": "interactive",
        "interactive": {
            "type": "order_details",
            "order_details": {
                "header": {
                    "type": "image",
                    "image": {
                        "link": "http(s)://the-url",
                        "provider": {
                            "name": "provider-name"
                        }
                    }
                },
                "body": {
                    "text": "your-text-body-content"
                },
                "footer": {
                    "text": "your-text-footer-content"
                },
                "action": {
                    "reference_id": "unique-reference-id",
                    "type": "digital-goods",
                    "payment_type": "p2m-lite:stripe",
                    "payment_configuration": "my-payment-config-name",
                    "currency": "SGD",
                    "total_amount": {
                        "value": 1000,
                        "offset": 100
                    },
                    "order": {
                        "status": "pending",
                        "items": [
                            {
                                "retailer_id": "1234567",
                                "name": "bread",
                                "amount": {
                                    "value": 10000,
                                    "offset": 100
                                },
                                "sale_amount": {
                                    "value": 100,
                                    "offset": 100
                                },
                                "quantity": 1
                            }
                        ],
                        "subtotal": {
                            "value": 20000,
                            "offset": 100
                        },
                        "tax": {
                            "value": 1000,
                            "offset": 100,
                            "description": "optional_text"
                        },                    
                        "shipping": {
                            "value": 1000,
                            "offset": 100,
                            "description": "optional_text"
                        },
                        "discount": {
                            "value": 1000,
                            "offset": 100,
                            "description": "optional_text",
                            "discount_program_name": "optional_text"
                        },
                        "catalog_id": "optional-catalog_id",
                        "expiration": {
                            "timestamp": "utc_timestamp_in_seconds",
                            "description": "cancellation-explanation"
                        }
                    }
                }
            }
        }
    }
examples: ./.resources/Send Order Details Message.resources/examples
order: 1000
