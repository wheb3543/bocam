$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{User-Access-Token}}
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-WA-ID}}",
          "type": "interactive",
          "interactive": {
              "type": "order_details",
              "order_details": {
                  "header": {
                      "type": "image",
                      "image": {
                          "link": "http(s)://the-url",
                          "provider": {
                              "name": "provider-name"
                          }
                      }
                  },
                  "body": {
                      "text": "your-text-body-content"
                  },
                  "footer": {
                      "text": "your-text-footer-content"
                  },
                  "action": {
                      "reference_id": "unique-reference-id",
                      "type": "digital-goods",
                      "payment_type": "p2m-lite:stripe",
                      "payment_configuration": "my-payment-config-name",
                      "currency": "SGD",
                      "total_amount": {
                          "value": 1000,
                          "offset": 100
                      },
                      "order": {
                          "status": "pending",
                          "items": [
                              {
                                  "retailer_id": "1234567",
                                  "name": "bread",
                                  "amount": {
                                      "value": 10000,
                                      "offset": 100
                                  },
                                  "sale_amount": {
                                      "value": 100,
                                      "offset": 100
                                  },
                                  "quantity": 1
                              }
                          ],
                          "subtotal": {
                              "value": 20000,
                              "offset": 100
                          },
                          "tax": {
                              "value": 1000,
                              "offset": 100,
                              "description": "optional_text"
                          },                    
                          "shipping": {
                              "value": 1000,
                              "offset": 100,
                              "description": "optional_text"
                          },
                          "discount": {
                              "value": 1000,
                              "offset": 100,
                              "description": "optional_text",
                              "discount_program_name": "optional_text"
                          },
                          "catalog_id": "optional-catalog_id",
                          "expiration": {
                              "timestamp": "utc_timestamp_in_seconds",
                              "description": "cancellation-explanation"
                          }
                      }
                  }
              }
          }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "contacts": [
              {
                  "input": "+1-631-555-5555",
                  "wa_id": "16315555555"
              }
          ],
          "messages": [
              {
                  "id": "wamid.gBGGFlaCGg0xcvAdgmZ9plHrf2Mh-o"
              }
          ]
      }
order: 1000
