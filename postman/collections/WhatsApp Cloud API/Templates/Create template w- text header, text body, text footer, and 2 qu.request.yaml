$kind: http-request
name: Create template w/ text header, text body, text footer, and 2 quick reply buttons
description: |-
  - Guide: [Message Templates](https://developers.facebook.com/docs/whatsapp/business-management-api/message-templates)
  - Guide: [How To Monitor Quality Signals](https://developers.facebook.com/docs/whatsapp/guides/how-to-monitor-quality-signals)
  - Endpoint reference: [WhatsApp Business Account > Message Templates](https://developers.facebook.com/docs/graph-api/reference/whats-app-business-account/message_templates/)
url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates
method: POST
body:
  type: json
  content: |-
    {
        "name": "seasonal_promotion_text_only",
        "language": "en",
        "category": "MARKETING",
        "components": [
            {
                "type": "HEADER",
                "format": "TEXT",
                "text": "Our {{1}} is on!",
                "example": {
                    "header_text": [
                        "Summer Sale"
                    ]
                }
            },
            {
                "type": "BODY",
                "text": "Shop now through {{1}} and use code {{2}} to get {{3}} off of all merchandise.",
                "example": {
                    "body_text": [
                        [
                            "the end of August","25OFF","25%"
                        ]
                    ]
                }
            },
            {
                "type": "FOOTER",
                "text": "Use the buttons below to manage your marketing subscriptions"
            },
            {
                "type":"BUTTONS",
                "buttons": [
                    {
                        "type": "QUICK_REPLY",
                        "text": "Unsubcribe from Promos"
                    },
                    {
                        "type":"QUICK_REPLY",
                        "text": "Unsubscribe from All"
                    }
                ]
            }
        ]
    }
examples: ./.resources/Create template w- text header, text body, text footer, and 2 qu.resources/examples
order: 9000
