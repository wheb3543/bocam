$kind: http-request
name: Create authentication template w/ OTP copy code button
description: |-
  - Guide: [Authentication Templates with OTP Buttons](https://developers.facebook.com/docs/whatsapp/business-management-api/authentication-templates)
  - Guide: [Message Templates](https://developers.facebook.com/docs/whatsapp/business-management-api/message-templates)
  - Guide: [How To Monitor Quality Signals](https://developers.facebook.com/docs/whatsapp/guides/how-to-monitor-quality-signals)
  - Endpoint reference: [WhatsApp Business Account > Message Templates](https://developers.facebook.com/docs/graph-api/reference/whats-app-business-account/message_templates/)
url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates
method: POST
body:
  type: json
  content: |-
    {
        "name": "authentication_code_copy_code_button",
        "language": "en_US",
        "category": "AUTHENTICATION",
        "components": [
            {
                "type": "BODY",
                "add_security_recommendation": true
            },
            {
                "type": "FOOTER",
                "code_expiration_minutes": 10
            },
            {
                "type": "BUTTONS",
                "buttons": [
                    {
                        "type": "OTP",
                        "otp_type": "COPY_CODE",
                        "text": "Copy Code"
                    }
                ]
            }
        ]
    }
examples: ./.resources/Create authentication template w- OTP copy code button.resources/examples
order: 5000
