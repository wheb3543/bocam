$kind: http-request
name: Create template w/ location header, text body, text footer, and a website buttons
description: |-
  - Guide: [Message Templates](https://developers.facebook.com/docs/whatsapp/business-management-api/message-templates)
  - Guide: [How To Monitor Quality Signals](https://developers.facebook.com/docs/whatsapp/guides/how-to-monitor-quality-signals)
  - Endpoint reference: [WhatsApp Business Account > Message Templates](https://developers.facebook.com/docs/graph-api/reference/whats-app-business-account/message_templates/)
url: https://graph.facebook.com/{{Version}}/{{WABA-ID}}/message_templates
method: POST
body:
  type: json
  content: |-
    {
        "name": "order_delivery_update",
        "language": "en_US",
        "category": "UTILITY",
        "components": [
            {
                "type": "HEADER",
                "format": "LOCATION"
            },
            {
                "type": "BODY",
                "text": "Good news {{1}}! Your order #{{2}} is on its way to the location above. Thank you for your order!",
                "example": {
                    "body_text": [
                        [
                            "Mark",
                            "566701"
                        ]
                    ]
                }
            },
            {
                "type": "FOOTER",
                "text": "To stop receiving delivery updates, tap the button below."
            },
            {
                "type":"BUTTONS",
                "buttons": [
                    {
                        "type": "QUICK_REPLY",
                        "text": "Stop Delivery Updates"
                    }
                ]
            }
        ]
    }
examples: ./.resources/Create template w- location header, text body, text footer, and.resources/examples
order: 11000
