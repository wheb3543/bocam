$kind: http-request
description: |-
  - Guide: [Typing indicators](https://developers.facebook.com/docs/whatsapp/cloud-api/typing-indicators)
      
  - Endpoint reference: [WhatsApp Business Phone Number &gt; Messages](https://developers.facebook.com/docs/graph-api/reference/whats-app-business-account-to-number-current-status/messages/#Creating)
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
method: POST
body:
  type: json
  content: |-
    {
        "messaging_product": "whatsapp",
        "status": "read",
        "message_id": "<WHATSAPP_MESSAGE_ID>",
        "typing_indicator": {
            "type": "text"
        }
    }
examples: ./.resources/Send typing indicator and read receipt.resources/examples
order: 1000
