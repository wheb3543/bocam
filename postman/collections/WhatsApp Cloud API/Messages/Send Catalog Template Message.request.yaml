$kind: http-request
description: |-
  To send a single product message, make a **POST** call to the **`/{{Version}}/phone_number/messages`** endpoint.

  This request uses an **`interactive`** object and parameter **`type`** should be set to `interactive`. The **`interactive`** parameter must also be set to the **`interactive`** object associated with the single product message. 

  ### Parameters

  | Name | Description |
  | --- | --- |
  | **`messaging_product`** | **Required**.<br/>Always set this value to `"whatsapp"`. |
  | **`recipient_type`** | **Optional**.<br/> Currently, you can only send messages to individuals. Set this value to `"individual"`. <br/><br/>**Default**: `individual` |
  | **`to`** | **Required**. <br/> WhatsApp ID or phone number for the person you want to send a message to.<br></br>See [Phone Numbers, Formatting](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/phone-numbers#formatting) for more information. |
  | **`type`** | **Required**.<br/> To send single product messages, set this string value to `"interactive"`. |
  | **`interactive`** | **Required**. <br/> The [interactive object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#interactive-object) associated with the single product message. |

  ### Interactive Object Parameters specific to Single Product Messages
  | Name | Description |
  | --- | --- |
  | **`type`** | **Required**.<br/>Specifies the type of interactive object. For single product messages set this value to `"product"`.|
  | **`action`** | **Required**.<br/> |
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "messaging_product": "whatsapp",
        "recipient_type": "individual",
        "to": "{{Recipient-Phone-Number}}",
        "type": "template",
        "template": {
            "name": "intro_catalog_offer",
            "language": {
                "code": "en_US"
            },
            "components": [
                {
                    "type": "body",
                    "parameters": [
                        {
                            "type": "text",
                            "text": "100"
                        },
                        {
                            "type": "text",
                            "text": "400"
                        },
                        {
                            "type": "text",
                            "text": "3"
                        }
                    ]
                },
                {
                    "type": "button",
                    "sub_type": "CATALOG",
                    "index": 0,
                    "parameters": [
                        {
                            "type": "action",
                            "action": {
                                "thumbnail_product_retailer_id": "2lc20305pt"
                            }
                        }
                    ]
                }
            ]
        }
    }
examples: ./.resources/Send Catalog Template Message.resources/examples
order: 40000
