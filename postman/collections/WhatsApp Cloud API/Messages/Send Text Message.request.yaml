$kind: http-request
description: |-
  To send a text message, make a **POST** call to **`/{{{Phone-Number-ID}}/messages`** and attach a message object with `type = "text"`. Then, add a `text object`.

  For more information about the `Text Object` structure, see [Text object](#fa59d67b-dc6f-446a-a0fd-f97537afbd2e).

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**. Use the ID listed after **`wamid`** to track your message status.
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "messaging_product": "whatsapp",    
        "recipient_type": "individual",
        "to": "{{Recipient-Phone-Number}}",
        "type": "text",
        "text": {
            "preview_url": false,
            "body": "text-message-content"
        }
    }
examples: ./.resources/Send Text Message.resources/examples
order: 2000
