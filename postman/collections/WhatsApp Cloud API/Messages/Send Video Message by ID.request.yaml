$kind: http-request
description: |-
  To send a media message, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a message object with type = `video`. Then, add a corresponding `video object` ID.

  For more information about the `Media Object` structure, see [Media Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#media-object).

  Send a video message to your customers using the media ID uploaded from media endpoint.

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**. Use the ID listed after **`wamid`** to track your message status.
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "messaging_product": "whatsapp",
        "recipient_type": "individual",
        "to": "{{Recipient-Phone-Number}}",
        "type": "video",
        "video": {
            "caption": "<VIDEO_CAPTION_TEXT>",
            "id": "<VIDEO_OBJECT_ID>"
        }
    }
examples: ./.resources/Send Video Message by ID.resources/examples
order: 22000
