$kind: http-request
description: |-
  Before sending a message template, you need to create one. See [Create Template Using the WhatsApp Manager](https://developers.facebook.com/docs/whatsapp/message-templates/creation) for more information. If your account is not verified yet, you can use one of our [pre-approved templates](https://www.facebook.com/business/help/722393685250070).

  To send an interactive message template, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a message object with `type=template`. Then, add a template object with your chosen button.

  Interactive message templates expand the content you can send recipients beyond the standard message template and media messages template types to include interactive buttons using the components object. There are two types of predefined buttons offered:

  * Call-to-Action — Allows your customer to call a phone number and visit a website.
  * Quick Reply — Allows your customer to return a simple text message.

  These buttons can be attached to text messages or media messages. Once your interactive message templates have been created and approved, you can use them in notification messages as well as customer service/care messages.

  ## Message Objects

  Interactive message templates can contain the following `Message Objects`:

  * [Template Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#template-object)
  * [Component Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#components-object)
  * [Parameter Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#parameter-object)
  * [Currency Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#currency-object)
  * [Date_Time Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#date-time-object)

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**.
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
method: POST
headers:
  Content-Type: application/json
