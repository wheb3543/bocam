$kind: http-request
description: |-
  To send a reply to document message, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a media object with type = `document`. Then, add the corresponding `document object` ID.

  Assign **`context.message_id`** the message id of the message you want to reply to.

  ## Request Parameters

  | Parameter | Description |
  |---|---|
  | **`messaging_product`** | **Required**<br/>Messaging service used for the request. Use `"whatsapp"`.
  | **`context.message_id`** | **Required for context object**<br/>Specifies the ID of the message being replied to. |
  | **`type`** | **Required**<br/> Specifies the media type. Use "document".|
  | **`document.id`** | Specifies the ID of the document object you are replying to. |

  For more information about the `Media Object` structure, see [Media Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#media-object).

  Send a document message to your customers using media ID uploaded from media endpoint.

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**. Use the ID listed after **`wamid`** to track your message status.
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "messaging_product": "whatsapp",
        "recipient_type": "individual",
        "to": "{{Recipient-Phone-Number}}",
        "context": {
            "message_id": "<MSGID_OF_MSG_YOU_ARE_REPLYING_TO>"
        },
        "type": "document",
        "document": {
            "id": "<DOCUMENT_OBJECT_ID>",
            "caption": "<DOCUMENT_CAPTION_TO_SEND>",
            "filename": "<DOCUMENT_FILENAME>"
        }
    }
examples: ./.resources/Send Reply to Document Message by ID.resources/examples
order: 15000
