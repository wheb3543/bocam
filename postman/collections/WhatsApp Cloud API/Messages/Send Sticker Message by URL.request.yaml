$kind: http-request
description: |-
  To send a media message, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a message object with type = `sticker`. Then, add a link to the corresponding `sticker` file.

  For more information about the `Media Object` structure, see [Media Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#media-object).

  Send a sticker message to your customers using link.

  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**. Use the ID listed after **`wamid`** to track your message status.
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "messaging_product": "whatsapp",
        "recipient_type": "individual",
        "to": "{{Recipient-Phone-Number}}",
        "type": "sticker",
        "sticker": {
            "link": "<http(s)://sticker-url>"
        }
    }
examples: ./.resources/Send Sticker Message by URL.resources/examples
order: 20000
