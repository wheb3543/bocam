$kind: http-example
request:
  url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{User-Access-Token}}
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-Phone-Number}}",
          "context": {
              "message_id": "<MSGID_OF_MSG_YOU_ARE_REPLYING_TO>"
          },
          "type": "audio",
          "audio": {
              "link": "http(s)://audio-url",
              "voice": true
          }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "contacts": [
              {
                  "input": "48XXXXXXXXX",
                  "wa_id": "48XXXXXXXXX "
              }
          ],
          "messages": [
              {
                  "id": "wamid.gBGGSFcCNEOPAgkO_KJ55r4w_ww"
              }
          ]
      }
order: 1000
