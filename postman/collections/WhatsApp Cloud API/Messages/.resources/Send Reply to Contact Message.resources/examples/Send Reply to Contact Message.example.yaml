$kind: http-example
request:
  url: https://graph.facebook.com/v13.0/{{Phone-Number-ID}}/messages
  method: POST
  headers:
    Authorization: Bearer {{User-Access-Token}}
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "to": "{{Recipient-Phone-Number}}",
          "context": {
              "message_id": "<MSGID_OF_PREV_MSG>"
          },
          "type": "contacts",
          "contacts": [
              {
                  "addresses": [
                      {
                          "street": "1 Hacker Way",
                          "city": "Menlo Park",
                          "state": "CA",
                          "zip": "94025",
                          "country": "United States",
                          "country_code": "us",
                          "type": "HOME"
                      },
                      {
                          "street": "200 Jefferson Dr",
                          "city": "Menlo Park",
                          "state": "CA",
                          "zip": "94025",
                          "country": "United States",
                          "country_code": "us",
                          "type": "WORK"
                      }
                  ],
                  "birthday": "2012-08-18",
                  "emails": [
                      {
                          "email": "test@fb.com",
                          "type": "WORK"
                      },
                      {
                          "email": "test@whatsapp.com",
                          "type": "HOME"
                      }
                  ],
                  "name": {
                      "formatted_name": "John Smith",
                      "first_name": "John",
                      "last_name": "Smith",
                      "middle_name": "D.",
                      "suffix": "Jr",
                      "prefix": "Dr"
                  },
                  "org": {
                      "company": "WhatsApp",
                      "department": "Design",
                      "title": "Manager"
                  },
                  "phones": [
                      {
                          "phone": "+1 (940) 555-1234",
                          "type": "HOME"
                      },
                      {
                          "phone": "+1 (650) 555-1234",
                          "type": "WORK",
                          "wa_id": "16505551234"
                      }
                  ],
                  "urls": [
                      {
                          "url": "https://www.facebook.com",
                          "type": "WORK"
                      },
                      {
                          "url": "https://www.whatsapp.com",
                          "type": "HOME"
                      }
                  ]
              }
          ]
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "contacts": [
              {
                  "input": "48XXXXXXXXX",
                  "wa_id": "48XXXXXXXXX "
              }
          ],
          "messages": [
              {
                  "id": "wamid.gBGGSFcCNEOPAgkO_KJ55r4w_ww"
              }
          ]
      }
order: 1000
