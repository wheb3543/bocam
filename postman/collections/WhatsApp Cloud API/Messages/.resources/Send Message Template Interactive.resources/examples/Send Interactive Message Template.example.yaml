$kind: http-example
request:
  url: https://graph.facebook.com/v13.0/{{Phone-Number-ID}}/messages
  method: POST
  headers:
    Authorization: Bearer {{User-Access-Token}}
    Content-Type: application/json
  body:
    type: json
    content: |
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-Phone-Number}}",
          "type": "template",
          "template": {
              "name": "template-name",
              "language": {
                  "code": "language-and-locale-code"
              },
              "components": [
                  {
                      "type": "header",
                      "parameters": [
                          {
                              "type": "image",
                              "image": {
                                  "link": "http(s)://the-image-url"
                              }
                          }
                      ]
                  },
                  {
                      "type": "body",
                      "parameters": [
                          {
                              "type": "text",
                              "text": "text-string"
                          },
                          {
                              "type": "currency",
                              "currency": {
                                  "fallback_value": "$100.99",
                                  "code": "USD",
                                  "amount_1000": 100990
                              }
                          },
                          {
                              "type": "date_time",
                              "date_time": {
                                  "fallback_value": "February 25, 1977",
                                  "day_of_week": 5,
                                  "year": 1977,
                                  "month": 2,
                                  "day_of_month": 25,
                                  "hour": 15,
                                  "minute": 33,
                                  "calendar": "GREGORIAN"
                              }
                          }
                      ]
                  },
                  {
                      "type": "button",
                      "sub_type": "quick_reply",
                      "index": "0",
                      "parameters": [
                          {
                              "type": "payload",
                              "payload": "aGlzIHRoaXMgaXMgY29v"
                          }
                      ]
                  },
                  {
                      "type": "button",
                      "sub_type": "quick_reply",
                      "index": "1",
                      "parameters": [
                          {
                              "type": "payload",
                              "payload": "9rwnB8RbYmPF5t2Mn09x4h"
                          }
                      ]
                  }
              ]
          }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "contacts": [
              {
                  "input": "48XXXXXXXXX",
                  "wa_id": "48XXXXXXXXX "
              }
          ],
          "messages": [
              {
                  "id": "wamid.gBGGSFcCNEOPAgkO_KJ55r4w_ww"
              }
          ]
      }
order: 1000
