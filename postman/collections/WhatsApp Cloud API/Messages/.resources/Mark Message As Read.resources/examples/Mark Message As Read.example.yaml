$kind: http-example
request:
  url: https://graph.facebook.com/v13.0/{{Phone-Number-ID}}/messages
  method: PUT
  headers:
    Authorization: Bearer {{User-Access-Token}}
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "status": "read",
          "message_id": "wamid.234123"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "success": true
      }
order: 1000
