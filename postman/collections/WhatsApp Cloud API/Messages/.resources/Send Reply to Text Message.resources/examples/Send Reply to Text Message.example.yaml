$kind: http-example
request:
  url: https://graph.facebook.com/v13.0/{{Phone-Number-ID}}/messages
  method: POST
  headers:
    Authorization: Bearer {{User-Access-Token}}
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-Phone-Number}}",
          "context": {
              "message_id": "<MSGID_OF_PREV_MSG>"
          },
          "type": "text",
          "text": {
              "preview_url": false,
              "body": "<TEXT_MSG_CONTENT>"
          }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "contacts": [
              {
                  "input": "48XXXXXXXXX",
                  "wa_id": "48XXXXXXXXX "
              }
          ],
          "messages": [
              {
                  "id": "wamid.gBGGSFcCNEOPAgkO_KJ55r4w_ww"
              }
          ]
      }
order: 1000
