$kind: http-example
request:
  url: https://graph.facebook.com/v13.0/{{Phone-Number-ID}}/messages
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{User-Access-Token}}
  body:
    type: json
    content: |-
      {
          "messaging_product": "whatsapp",
          "recipient_type": "individual",
          "to": "{{Recipient-Phone-Number}}",
          "type": "interactive",
          "interactive": {
              "type": "button",
              "body": {
                  "text": "<BUTTON_TEXT>"
              },
              "action": {
                  "buttons": [
                      {
                          "type": "reply",
                          "reply": {
                              "id": "<UNIQUE_BUTTON_ID_1>",
                              "title": "<BUTTON_TITLE_1>"
                          }
                      },
                      {
                          "type": "reply",
                          "reply": {
                              "id": "<UNIQUE_BUTTON_ID_2>",
                              "title": "<BUTTON_TITLE_2>"
                          }
                      }
                  ]
              }
          }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "messaging_product": "whatsapp",
        "contacts": [{
            "input": "PHONE_NUMBER",
            "wa_id": "WHATSAPP_ID"
          }],
        "messages": [{
            "id": "wamid.ID"
          }]
      }
order: 1000
