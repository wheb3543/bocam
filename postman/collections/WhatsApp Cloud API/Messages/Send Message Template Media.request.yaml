$kind: http-request
description: |-
  Media message templates allow you to send media content as a header component beyond text template with parameters in the body component. Before sending a message template, you need to create one. See [Create Template Using the WhatsApp Manager](https://developers.facebook.com/docs/whatsapp/message-templates/creation) for more information. If your account is not verified yet, you can use one of our pre-approved templates.

  To send a media-based message template, make a **POST** call to **`/{{Phone-Number-ID}}/messages`** and attach a message object with type = `template`. Then, add a template object.

  ## Prerequisites

  - You need to create a message template through [WhatsApp Manager](https://developers.facebook.com/docs/whatsapp/message-templates/creation) or [BM API](https://developers.facebook.com/docs/whatsapp/business-management-api/message-templates#creating-message-templates)
  - For an unverified account, we have already [pre-created message templates](https://www.facebook.com/business/help/722393685250070) for you to use.

  ## Message Objects

  Media-Based message templates can contain the following `Message Objects`:

  * [Template Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#template-object)
  * [Component Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#components-object)
  * [Parameter Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#parameter-object)
  * [Currency Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#currency-object)
  * [Date_Time Object](https://developers.facebook.com/docs/whatsapp/cloud-api/reference/messages#date-time-object)


  ## Response

  A successful response includes an object with an identifier prefixed with **`wamid`**.
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/messages
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "messaging_product": "whatsapp",
        "recipient_type": "individual",
        "to": "{{Recipient-Phone-Number}}",
        "type": "template",
        "template": {
            "name": "template-name",
            "language": {
                "code": "language-and-locale-code"
            },
            "components": [
                {
                    "type": "header",
                    "parameters": [
                        {
                            "type": "image",
                            "image": {
                                "link": "http(s)://the-image-url"
                            }
                        }
                    ]
                },
                {
                    "type": "body",
                    "parameters": [
                        {
                            "type": "text",
                            "text": "text-string"
                        },
                        {
                            "type": "currency",
                            "currency": {
                                "fallback_value": "$100.99",
                                "code": "USD",
                                "amount_1000": 100990
                            }
                        },
                        {
                            "type": "date_time",
                            "date_time": {
                                "fallback_value": "February 25, 1977",
                                "day_of_week": 5,
                                "year": 1977,
                                "month": 2,
                                "day_of_month": 25,
                                "hour": 15,
                                "minute": 33,
                                "calendar": "GREGORIAN"
                            }
                        }
                    ]
                }
            ]
        }
    }
examples: ./.resources/Send Message Template Media.resources/examples
order: 31000
