$kind: http-request
description: |-
  - Guide: [Block Users](https://developers.facebook.com/docs/whatsapp/cloud-api/block-users)
      
  - Endpoint reference: [DELETE WhatsApp Buiness Phone Number &gt; block_users](https://developers.facebook.com/docs/graph-api/reference/whats-app-business-account-to-number-current-status/block_users/#Deleting)
url: https://graph.facebook.com/{{Version}}/{{Phone-Number-ID}}/block_users
method: DELETE
body:
  type: json
  content: |-
    {
        "messaging_product": "whatsapp",
        "block_users": [
            {
                "user": "{{Recipient-Phone-Number}}"
            }
        ]
    }
examples: ./.resources/Unblock user(s).resources/examples
order: 3000
